                border-left:3px solid var(--blue);line-height:1.6">
      <svg class="ui-icon" viewBox="0 0 24 24" style="color:var(--blue)"><path d="M9 18h6M10 22h4"/><path d="M8 14a6 6 0 1 1 8 0l-.6.7a3 3 0 0 0-.9 2.1V18H9.5v-1.2a3 3 0 0 0-.9-2.1z"/></svg> <strong style="color:var(--blue)">送信したスタンプ・コメントの表示場所</strong><br>
      生徒がアプリを開いたとき、<strong>「宣言・実績」画面の上部</strong>（目標入力欄のすぐ下）に
      「<svg class="ui-icon" viewBox="0 0 24 24"><path d="M21 12a8 8 0 0 1-8 8 8.3 8.3 0 0 1-4-1l-5 1 1-4.5A8 8 0 0 1 21 12z"/></svg> 講師からのメッセージ」として表示されます。<br>
      表示されるのは<strong>その週の週番号に対応したコメント</strong>のみです。
    </div>`;

  // 日時フォーマットヘルパー
  const fmtDt = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')} `
         + `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };
  const EXPIRE_HOURS = 24;

  content.innerHTML = infoBanner + students.map(p => {
    const existing = (existingComments || []).find(c => c.target_user_id === p.id);
    const savedStamps  = existing?.stamps  || [];
    const savedComment = existing?.comment || '';
    const updatedAt    = existing?.updated_at || null;

    // 送信日時ラベル
    let timeStatusHtml = '';
    if (updatedAt) {
      const hoursElapsed = (Date.now() - new Date(updatedAt).getTime()) / 3600000;
      if (hoursElapsed >= EXPIRE_HOURS) {
        timeStatusHtml = `<div style="font-size:0.72rem;color:var(--text2);margin-top:6px">
          <svg class="ui-icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/></svg> ${fmtDt(updatedAt)} 送信（生徒側では既に非表示）</div>`;
      } else {
        timeStatusHtml = `<div style="font-size:0.72rem;color:var(--text2);margin-top:6px">
          <svg class="ui-icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/></svg> ${fmtDt(updatedAt)} 送信</div>`;
      }
    }

    const previewHtml = (savedStamps.length > 0 || savedComment)
      ? `<div class="comment-preview">${savedStamps.join(' ')} ${savedComment}</div>` : '';

    const stampsHtml = STAMPS.map(s =>
      `<button class="stamp-btn ${savedStamps.includes(s) ? 'selected' : ''}"
               onclick="toggleStamp(this,'${p.id}')">${s}</button>`
    ).join('');

    return `
      <div class="comment-student-card" id="ccard-${p.id}">
        <div class="comment-student-header" onclick="toggleCommentExpand('${p.id}')">
          <div class="comment-student-name">${getAdminDisplayName(p, adminNames)}</div>
          <span class="comment-expand-icon" id="cicon-${p.id}">▼</span>
        </div>
        <div class="comment-student-body" id="cbody-${p.id}" style="display:none">
          <div class="stamp-row" id="stamps-${p.id}">${stampsHtml}</div>
          <textarea class="comment-textarea" id="ctext-${p.id}" placeholder="コメントを入力...">${savedComment}</textarea>
          <button class="comment-send-btn" onclick="saveAdminComment('${p.id}','${wsStr}')"><svg class="ui-icon" viewBox="0 0 24 24"><path d="M21 12a8 8 0 0 1-8 8 8.3 8.3 0 0 1-4-1l-5 1 1-4.5A8 8 0 0 1 21 12z"/></svg> 送信</button>
          ${previewHtml}
          ${timeStatusHtml}
        </div>
      </div>`;
  }).join('');
}

function toggleCommentExpand(userId) {
  const body  = document.getElementById(`cbody-${userId}`);
  const icon  = document.getElementById(`cicon-${userId}`);
  const open  = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  icon.style.transform = open ? 'rotate(180deg)' : '';
}

function toggleStamp(btn, userId) {
  btn.classList.toggle('selected');
}

async function saveAdminComment(userId, weekId) {
  const stampsEl  = document.querySelectorAll(`#stamps-${userId} .stamp-btn.selected`);
  const stamps    = Array.from(stampsEl).map(b => b.textContent);
  const comment   = document.getElementById(`ctext-${userId}`).value.trim();

  const { error } = await sb.from('teacher_comments').upsert({
    target_user_id: userId,
    week_id:        weekId,
    stamps,
    comment,
    created_by:     currentUser.id,
    updated_at:     new Date().toISOString()
  }, { onConflict: 'target_user_id,week_id' });

  if (error) { showToast('❌ 送信失敗: ' + error.message); return; }
  showToast('✅ コメントを送信しました！');

  // プレビュー更新
  const card = document.getElementById(`ccard-${userId}`);
  let preview = card.querySelector('.comment-preview');
  if (!preview) {
    preview = document.createElement('div');
    preview.className = 'comment-preview';
    card.querySelector('.comment-student-body').appendChild(preview);
  }
  preview.textContent = stamps.join(' ') + ' ' + comment;
}

async function loadAdminStudents() {
  const content = document.getElementById('admin-content');
  content.innerHTML = '<div class="loading">読み込み中...</div>';

  const [{ data: profiles }, adminNames] = await Promise.all([
    sb.from('profiles').select('*').order('name'),
    fetchAdminDisplayNames(),
  ]);
  if (!profiles?.length) { content.innerHTML = '<div class="empty-state">生徒データがありません</div>'; return; }

  const GRADES = ['', '中学1年生', '中学2年生', '中学3年生', '高校1年生', '高校2年生', '高校3年生', '既卒'];

  // 講師（ADMIN_EMAILS）と生徒を分ける
  const adminProfile    = profiles.filter(p =>  ADMIN_EMAILS.includes(p.email));
  const studentProfiles = profiles.filter(p => !ADMIN_EMAILS.includes(p.email));

  // カード生成ヘルパー
  function buildMgmtCard(p, isTeacher) {
    const displayName  = getAdminDisplayName(p, adminNames);
    const displayGrade = getAdminDisplayGrade(p, adminNames);
    const gradeOptions = GRADES.map(g =>
      `<option value="${g}" ${g === displayGrade ? 'selected' : ''}>${g || '（学年未設定）'}</option>`
    ).join('');
    return `
      <div class="student-mgmt-card">
        <div class="student-mgmt-row">
          <div class="student-mgmt-info">
            <div class="student-mgmt-name" style="display:flex;align-items:center;gap:8px">
              ${displayName}
              ${isTeacher ? '<span class="teacher-badge"><svg class="ui-icon" viewBox="0 0 24 24" style="width:0.9em;height:0.9em"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg> 講師</span>' : ''}
            </div>
            <div class="student-mgmt-sub">
              ${displayGrade ? `<span class="grade-tag">${displayGrade}</span>` : ''}
            </div>
          </div>
          <button class="student-edit-btn" onclick="toggleStudentEdit('${p.id}')">編集</button>
        </div>
        <div class="student-edit-form" id="sedit-${p.id}">
          <div class="form-group" style="margin-top:10px">
            <label class="form-label">管理者画面での表示名</label>
            <input type="text" class="form-input" id="sname-${p.id}" value="${displayName}">
          </div>
          ${!isTeacher ? `
          <div class="form-group">
            <label class="form-label">学年</label>
            <select class="grade-select" id="sgrade-${p.id}">${gradeOptions}</select>
          </div>` : ''}
          <button class="btn btn-blue" style="margin-top:4px"
                  onclick="saveStudentProfile('${p.id}')"><svg class="ui-icon" viewBox="0 0 24 24"><path d="M5 3h12l4 4v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M7 3v6h10V3"/><path d="M7 14h10v7H7z"/></svg> 保存</button>
        </div>
      </div>`;
  }

  const noteBanner = `
    <div style="font-size:0.78rem;color:var(--text2);margin-bottom:14px;
                padding:10px 14px;background:var(--orange-light);border-radius:8px;
                border-left:3px solid var(--orange);line-height:1.6">
      ℹ️ <strong style="color:var(--orange)">管理者画面専用の表示名・学年です</strong><br>
      ここで変更した内容は<strong>管理者画面にのみ反映</strong>されます。
      生徒側の画面には影響しません。
    </div>`;

  const teacherSection = adminProfile.length ? `
    <div class="section-divider"><svg class="ui-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg> 講師</div>
    ${adminProfile.map(p => buildMgmtCard(p, true)).join('')}` : '';

  const studentSection = studentProfiles.length ? `
    <div class="section-divider"><svg class="ui-icon" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3 2.7-5.2 6-5.2s6 2.2 6 5.2"/><circle cx="17" cy="9" r="2.5"/><path d="M21 19c0-2.2-1.8-3.8-4-3.8"/></svg> 生徒一覧（${studentProfiles.length}名）</div>
    ${studentProfiles.map(p => buildMgmtCard(p, false)).join('')}` : '';

  content.innerHTML = noteBanner + teacherSection + studentSection;
}

function toggleStudentEdit(userId) {
  const form = document.getElementById(`sedit-${userId}`);
  form.classList.toggle('open');
}

async function saveStudentProfile(userId) {
  const name  = document.getElementById(`sname-${userId}`).value.trim();
  const grade = document.getElementById(`sgrade-${userId}`).value;
  if (!name) { showToast('表示名を入力してください'); return; }

  // 管理者専用テーブルに保存（生徒の profiles は変更しない）
  const { error } = await sb.from('admin_display_names').upsert({
    user_id:      userId,
    display_name: name,
    grade:        grade,
    updated_at:   new Date().toISOString()
  }, { onConflict: 'user_id' });

  if (error) { showToast('❌ 保存失敗: ' + error.message); return; }

  showToast('✅ 保存しました！（管理者画面のみ反映）');
  document.getElementById(`sedit-${userId}`).classList.remove('open');
  await loadAdminStudents(); // リロード
}

// ============================================================
//  ADMIN RANKING
// ============================================================
async function loadAdminRanking() {
  const content = document.getElementById('admin-content');
  content.innerHTML = '<div class="loading">読み込み中...</div>';

  const wsStr = formatISO(adminWeekStart);

  const [{ data: profiles }, { data: weekSes }, { data: allSes },
         { data: goals }, adminNames] = await Promise.all([
    sb.from('profiles').select('*'),
    sb.from('sessions').select('*').eq('week_start', wsStr),
    sb.from('sessions').select('*'),
    sb.from('weekly_goals').select('*').eq('week_start', wsStr),
    fetchAdminDisplayNames(),
  ]);

  // 講師（ADMIN_EMAILS）を除いた生徒リスト
  const students = (profiles || []).filter(p => !ADMIN_EMAILS.includes(p.email));
  if (!students.length) {
    content.innerHTML = '<div class="empty-state">データがありません</div>';
    return;
  }

  // 今週・累計それぞれの集計
  const stats = students.map(p => {
    const pWeekSes = (weekSes || []).filter(s => s.user_id === p.id);
    const pAllSes  = (allSes  || []).filter(s => s.user_id === p.id);
    const pGoal    = (goals   || []).find(g => g.user_id === p.id);

    const weekTotal = pWeekSes.reduce((s, r) => s + (r.duration_minutes || 0), 0);
    const weekDays  = new Set(pWeekSes.map(s => s.day_of_week)).size;

    const allTotal = pAllSes.reduce((s, r) => s + (r.duration_minutes || 0), 0);
    const allDays  = new Set(pAllSes.map(s => `${s.week_start}_${s.day_of_week}`)).size;

    const goalT = pGoal ? (pGoal.study_room_goal_minutes || 0) + (pGoal.gap_goal_minutes || 0) : 0;
    const rate  = goalT > 0 ? Math.round((weekTotal / goalT) * 100) : null;

    // 今週の出席ドット
    const dots = Array(7).fill(false);
    pWeekSes.forEach(s => { dots[s.day_of_week] = true; });

    return {
      p, weekTotal, weekDays, allTotal, allDays, rate, dots,
      displayName:  getAdminDisplayName(p, adminNames),
      displayGrade: getAdminDisplayGrade(p, adminNames),
    };
  });

  // 今週合計で並び替え
  const sorted = [...stats].sort((a, b) => b.weekTotal - a.weekTotal);

  const medals   = ['🥇', '🥈', '🥉'];
  const today    = new Date().getDay();
  const todayIdx = today === 0 ? 6 : today - 1;

  const rankRows = sorted.map((s, idx) => {
    const rankCls = idx === 0 ? 'rank-gold' : idx === 1 ? 'rank-silver' : idx === 2 ? 'rank-bronze' : '';
    const rankLbl = idx < 3 ? medals[idx] : `${idx + 1}`;
    const dotsHtml = s.dots.map((filled, i) =>
      `<div class="rdot ${filled ? 'filled' : ''} ${filled && i === todayIdx ? 'today' : ''}"
            title="${DAY_NAMES[i]}"></div>`
    ).join('');
    return `
      <div class="rank-card">
        <div class="rank-num ${rankCls}">${rankLbl}</div>
        <div class="rank-info">
          <div class="rank-name">${s.displayName}</div>
          ${s.displayGrade ? `<div style="font-size:0.72rem;color:var(--blue);margin-top:2px">${s.displayGrade}</div>` : ''}
          <div class="rank-dots">${dotsHtml}</div>
          <div class="rank-days">今週 ${s.weekDays}日 ／ 累計 ${s.allDays}日</div>
        </div>
        <div class="rank-stats">
          <div class="rank-time">${mToHM(s.weekTotal)}</div>
          <div class="rank-rate">${s.rate !== null ? `達成率 ${Math.min(s.rate,999)}%` : '目標未設定'}</div>
          <div style="font-size:0.72rem;color:var(--text2);margin-top:2px">累計 ${mToH(s.allTotal)}</div>
        </div>
      </div>`;
  }).join('');

  content.innerHTML = `
    <div style="font-size:0.78rem;color:var(--text2);margin-bottom:12px;
                padding:8px 12px;background:var(--surface2);border-radius:8px">
      <svg class="ui-icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/></svg> 表示中の週の学習時間で順位を表示しています。週ナビ（‹ ›）で週を変えられます。
    </div>
    ${rankRows}`;
}

// ============================================================
//  SESSION HANDLER（ログイン後の共通処理）
// ============================================================
async function handleSession(session) {
  // 二重実行防止
  if (currentUser && currentUser.id === session.user.id) return;

  currentUser = session.user;

  // ① まず画面を切り替える（エラーがあっても表示する）
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display  = 'block';

  try {
    // ② プロフィール取得（なければ作成）
    let { data: profile } = await sb.from('profiles').select('*')
      .eq('id', currentUser.id).maybeSingle();

    if (!profile) {
      const name = currentUser.user_metadata?.name || currentUser.email.split('@')[0];
      const { data: newP } = await sb.from('profiles')
        .upsert({ id: currentUser.id, name, email: currentUser.email }, { onConflict: 'id' })
        .select().maybeSingle();
      profile = newP || { id: currentUser.id, name, email: currentUser.email };
    } else if (!profile.email) {
      // 既存ユーザーでメールが未保存の場合は補完
      await sb.from('profiles').update({ email: currentUser.email }).eq('id', currentUser.id);
      profile.email = currentUser.email;
    }

    currentProfile = profile;
    document.getElementById('header-name').textContent = getName(profile);

    if (isAdmin()) {
      // 管理者: 一般タブを非表示にして管理者タブを表示
      document.getElementById('nav-declaration').style.display    = 'none';
      document.getElementById('nav-everyone').style.display       = 'none';
      document.getElementById('nav-myrecord').style.display       = 'none';
      document.getElementById('nav-admin-status').style.display   = 'flex';
      document.getElementById('nav-admin-comment').style.display  = 'flex';
      document.getElementById('nav-admin-students').style.display = 'flex';
      document.getElementById('nav-admin-ranking').style.display  = 'flex';
      await showAdminDirect('status');
    } else {
      await loadDeclarationScreen();
    }
  } catch (e) {
    console.error('初期化エラー:', e);
    showToast('⚠️ エラー: ' + e.message, 5000);
  }
}

// ============================================================
//  INIT
// ============================================================
async function init() {
  // 既存セッションの確認
  const { data: { session } } = await sb.auth.getSession();
  if (session) await handleSession(session);

  // 以降の認証変化を監視
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session) {
      await handleSession(session);
    } else {
      currentUser    = null;
      currentProfile = null;
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display  = 'none';
    }
  });
}

init();
</script>
